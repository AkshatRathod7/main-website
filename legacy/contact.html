<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project | DreamSVin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: hidden;
        }
        .contact-split {
            display: flex;
            height: 100vh;
        }
        .contact-left {
            flex: 1;
            background: var(--bg);
            padding: 8vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 0.5px solid var(--border-color);
        }
        .contact-right {
            flex: 1;
            background: var(--surface);
            padding: 8vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-group {
            margin-bottom: 40px;
        }
        .form-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--primary);
            font-family: var(--font-body);
            font-size: 18px;
            padding: 10px 0;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input:focus {
            border-bottom-color: var(--gold);
        }
        .submit-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 20px 40px;
            font-family: var(--font-display);
            font-size: 24px;
            cursor: pointer;
            width: 100%;
            margin-top: 40px;
            transition: transform 0.3s ease;
        }
        .submit-btn:hover {
            transform: scale(0.98);
        }
        @media (max-width: 1024px) {
            body { overflow: auto; }
            .contact-split { flex-direction: column; height: auto; }
            .contact-left { padding: 80px 8vw; }
            .contact-right { padding: 80px 8vw; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-trail"></div>

    <nav style="background: transparent; backdrop-filter: none;">
        <div class="logo"><a href="index.html">DREAM<span class="s">S</span><span class="v">V</span>IN</a></div>
        <div class="nav-links mono">
            <a href="index.html">Close</a>
        </div>
    </nav>

    <div class="contact-split">
        <div class="contact-left">
            <div class="logo" style="font-size: 100px; line-height: 1;">DREAM<br><span class="s">S</span><span class="v">V</span>IN</div>
            <p class="bebas" style="font-size: 32px; margin-top: 40px; color: var(--gold-dim);">WE DON'T CHASE GROWTH. WE DESIGN IT.</p>
        </div>
        <div class="contact-right">
            <h2 class="bebas" style="font-size: 48px; margin-bottom: 60px;">START A PROJECT</h2>
            <form>
                <div class="form-group">
                    <label class="form-label">NAME</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">COMPANY / PROJECT</label>
                    <input type="text" placeholder="e.g. Redefined" required>
                </div>
                <div class="form-group">
                    <label class="form-label">WHAT ARE YOU BUILDING?</label>
                    <input type="text" placeholder="Describe the goal" required>
                </div>
                <div class="form-group">
                    <label class="form-label">BUDGET RANGE</label>
                    <select style="color: var(--primary);">
                        <option>Discovery Phase</option>
                        <option>Strategic Growth ($10k - $30k)</option>
                        <option>Full Scale ($30k+)</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">SEND TO AKSHAT</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
